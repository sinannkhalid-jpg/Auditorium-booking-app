<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VenueBook</title>
<style>
/* Base styles */
body {
  font-family: 'Arial', sans-serif;
  margin: 0;
  background-color: #f5f7fa;
  color: #1a1a1a;
}

/* Minimal professional icons */
.svg-icon {
  width: 24px;
  height: 24px;
  fill: currentColor;
}

/* Navigation fixes */
.nav-icon {
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Updated button styling */
#profile-btn {
  border: none;
  background-color: #e9ecef;
}
</style>
</head>
<body>
<div id="root">
  <!-- Header -->
  <header>
    <h2>Welcome to VenueBook</h2>
    <button id="owner-mode-btn">
      <!-- Building icon -->
      <svg class="svg-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9.75 3.5a1.5 1.5 0 113 0M8.25 21v-3.375M15.75 21v-3.375"/>
      </svg>
      Owner Mode
    </button>
  </header>

  <!-- NavBar -->
  <footer>
    <button id="profile-btn">
      <!-- User Icon -->
      <svg xmlns="http://www.w3.org/2000/svg" class="svg-icon" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M18 10c0-4.418-3.582-8-8-8S2 5.582 2 10s3.582 8 8 8 8-3.582 8-8zm-8 4.25a5.5 5.5 0 100-11 5.5 5.5 0 000 11z"/>
      </svg>
      Profile
    </button>
  </footer>
</div>
<script>
/* Updated Script with enhanced buttons */
const ownerBtn = document.querySelector('#owner-mode-btn');
ownerBtn.addEventListener('click', () => {
  alert('Owner Mode Activated');
});
</script>
</body>
</html>
